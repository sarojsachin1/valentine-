<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valentine Proposal</title>

    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Dancing+Script:wght@700&display=swap"
        rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            overflow: hidden;
            background: linear-gradient(135deg, #ffd6e7, #ff4f81);
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
        }

        /* Container */
        .container {
            z-index: 5;
            padding: 20px;
        }

        /* Bouncing Bear */
        .bear {
            font-size: 60px;
            animation: bounce 1.5s infinite;
        }

        @keyframes bounce {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-15px);
            }
        }

        /* dummy data */

        
        /* Heading */
        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 40px;
            margin: 20px 0;
            color: #fff;
        }

        /* Subtitle */
        .subtitle {
            font-style: italic;
            color: #fff;
            margin-bottom: 25px;
        }

        /* Closing line */
        .closing {
            margin-top: 25px;
            color: #fff;
            font-weight: 500;
        }

        /* Buttons */
        .button-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            margin-top: 25px;
        }

        #yesBtn {
            padding: 15px 35px;
            border: none;
            border-radius: 50px;
            font-size: 18px;
            cursor: pointer;
            background: linear-gradient(45deg, #ff1a4d, #ff4f81);
            color: #fff;
            transition: 0.3s;
        }

        #yesBtn:hover {
            box-shadow: 0 0 20px rgba(255, 0, 100, 0.8);
            transform: scale(1.05);
        }

        #noBtn {
            padding: 10px 25px;
            border-radius: 30px;
            border: 2px solid red;
            background: #fff;
            color: red;
            font-size: 16px;
            cursor: pointer;
            position: relative;
        }

        /* Floating Hearts */
        .heart {
            position: fixed;
            bottom: -20px;
            animation: floatUp linear infinite;
            opacity: 0;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0);
                opacity: 0;
            }

            10% {
                opacity: 1;
            }

            100% {
                transform: translateY(-110vh);
                opacity: 0;
            }
        }

        /* Celebration */
        .celebration {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #ffd6e7, #ff4f81);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
            font-size: 40px;
            z-index: 10;
            display: none;
        }

        .pulse {
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.2);
            }

            100% {
                transform: scale(1);
            }
        }

        .spin {
            font-size: 50px;
            animation: spin 2s linear infinite;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        /* Confetti */
        .confetti {
            position: fixed;
            width: 8px;
            height: 8px;
            opacity: 0.9;
        }
    </style>
</head>

<body>

    <div class="container" id="mainContent">
        <div class="bear">🐻</div>
        <h1> bhai mera mu me lega </h1>
        <!-- <div class="subtitle">I've been gathering courage to ask you this...</div> -->

        <div class="button-row">
            <button id="yesBtn">Yes</button>
            <button id="noBtn">No</button>
        </div>

        <!-- <div class="closing">Every love story is beautiful, but ours is my favourite</div> -->
    </div>

    <div class="celebration" id="celebration">
        <div class="pulse">Yayyyy!!</div>
        <div class="spin">😍</div>
        <div style="margin-top:20px;">Mujhe Pta tha...</div>
    </div>

    <script>
        const noBtn = document.getElementById("noBtn");
        const yesBtn = document.getElementById("yesBtn");
        const messages = [
            "Nope, not an option!",
            "Try again!",
            "You sure about that?",
            "Not happening!",
            "Think again!"
        ];
        let msgIndex = 0;

        /* Floating Hearts */
        let heartsRunning = true;
        function createHeart() {
            if (!heartsRunning) return;
            const heart = document.createElement("div");
            heart.classList.add("heart");
            heart.innerText = "❤️";
            heart.style.left = Math.random() * 100 + "vw";
            heart.style.fontSize = (Math.random() * 20 + 15) + "px";
            heart.style.animationDuration = (Math.random() * 5 + 5) + "s";
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 10000);
        }
        for (let i = 0; i < 15; i++) {
            setInterval(createHeart, 800);
        }

        /* No Button Runs Away */
        function moveNoButton() {
            const yesRect = yesBtn.getBoundingClientRect();
            const width = window.innerWidth - 100;
            const height = window.innerHeight - 50;

            let newX, newY;
            do {
                newX = Math.random() * width;
                newY = Math.random() * height;
            } while (
                newX < yesRect.right &&
                newX + 100 > yesRect.left &&
                newY < yesRect.bottom &&
                newY + 50 > yesRect.top
            );

            noBtn.style.position = "fixed";
            noBtn.style.left = newX + "px";
            noBtn.style.top = newY + "px";

            noBtn.innerText = messages[msgIndex];
            msgIndex = (msgIndex + 1) % messages.length;
        }
        noBtn.addEventListener("click", moveNoButton);
        noBtn.addEventListener("touchstart", moveNoButton);

        /* YES Click */
        yesBtn.addEventListener("click", () => {
            heartsRunning = false;
            document.querySelectorAll(".heart").forEach(h => h.remove());
            document.getElementById("mainContent").style.display = "none";
            document.getElementById("celebration").style.display = "flex";

            for (let i = 0; i < 120; i++) {
                const confetti = document.createElement("div");
                confetti.classList.add("confetti");
                confetti.style.backgroundColor = "hsl(" + Math.random() * 360 + ",100%,50%)";
                confetti.style.left = Math.random() * 100 + "vw";
                confetti.style.top = "-10px";
                document.body.appendChild(confetti);

                confetti.animate([
                    { transform: "translateY(0) rotate(0deg)" },
                    { transform: "translateY(100vh) rotate(720deg)" }
                ], {
                    duration: 3000 + Math.random() * 2000,
                    iterations: 1
                });

                setTimeout(() => confetti.remove(), 5000);
            }
        });
    </script>

</body>


</html>
